<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro to Formula 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #2a2a2a;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    .screen {
      display: none;
      height: 100vh;
      padding: 48px 64px;
      flex-direction: column;
    }
    .screen.active { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-primary {
      background: #009688;
      color: #111;
      border: none;
      padding: 16px 40px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover { background: #00b39d; transform: translateY(-1px); }

    .btn-secondary {
      background: #3d3d3d;
      color: #fff;
      border: 2px solid #555;
      padding: 16px 40px;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: #4d4d4d; }

    /* ── HOME ── */
    #screen-home {
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .mode-cards {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }

    .mode-card {
      background: #3d3d3d;
      border: 2px solid #555;
      border-radius: 16px;
      padding: 40px 60px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25rem;
      font-weight: 700;
      min-width: 260px;
      justify-content: center;
    }
    .mode-card:hover { background: #4a4a4a; }
    .mode-card.selected { border-color: #009688; background: #1d3532; }
    .mode-card .icon { font-size: 1.8rem; }

    /* ── SHARED NAV ── */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .nav-back {
      background: none;
      border: none;
      color: #888;
      font-size: 0.95rem;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-back:hover { color: #fff; }
    .nav-title {
      color: #e10600;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <h1 style="color:#e10600; font-size:4rem; font-weight:800; margin-bottom:16px;">Intro to Formula 1</h1>
    <p style="color:#888; margin-bottom:56px; font-size:1.05rem;">Select a mode to get started</p>

    <div class="mode-cards">
      <div class="mode-card selected" id="mode-learning" onclick="selectMode('learning')">
        <span class="icon">🎓</span>
        <span>Learning</span>
      </div>
      <div class="mode-card" id="mode-quiz" onclick="selectMode('quiz')">
        <span class="icon">📝</span>
        <span>Interactive Quiz</span>
      </div>
    </div>

    <button class="btn-primary" onclick="startSelected()" style="padding:18px 80px; font-size:1.2rem;">Start</button>
  </div>

  <script>
    let selectedMode = 'learning';

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById('screen-' + id);
      if (el) el.classList.add('active');
    }

    function selectMode(mode) {
      selectedMode = mode;
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
      document.getElementById('mode-' + mode).classList.add('selected');
    }

    function startSelected() {
      showScreen(selectedMode === 'learning' ? 'learning-menu' : 'quiz-intro');
    }
  </script>
</body>
</html>
