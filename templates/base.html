<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>{% block title %}Intro to Formula 1{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <!-- Glass top nav: quiet by design. Sticks as user scrolls. -->
  <nav class="app-nav" aria-label="Primary">
    <a class="app-nav__brand" href="{{ url_for('home') }}">
      <span class="app-nav__mark" aria-hidden="true"></span>
      <span class="app-nav__wordmark">Intro to F1</span>
    </a>
    <div class="app-nav__links">
      <a href="{{ url_for('learning_menu') }}">Learn</a>
      <a href="{{ url_for('quiz', n=1) }}">Quiz</a>
    </div>
  </nav>

  <main class="screen active">
    {% block content %}{% endblock %}
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
